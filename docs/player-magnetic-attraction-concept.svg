  <rect width="720" height="1400" fill="#020305"/>
  <rect width="150" height="1400" fill="url(#leftVeil)"/>
  <rect x="570" width="150" height="1400" fill="url(#rightVeil)"/>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="360" y="74" font-size="28" fill="#ffffff" opacity="0.92">Magnetic Move FX</text>
    <text x="360" y="106" font-size="14" fill="#aeb8c5" opacity="0.78">Directional arrow flow with a few particles. Pulled, but still quiet.</text>
    <text x="360" y="134" font-size="13" fill="#8f99a8" opacity="0.7">Small arrows toward the target direction + faint trail + sparse particle drift</text>
  </g>

