<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1400" viewBox="0 0 720 1400" fill="none">
  <defs>
    <linearGradient id="leftVeil" x1="0" y1="0" x2="150" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6b42" stop-opacity="0.94"/>
      <stop offset="0.18" stop-color="#ff955f" stop-opacity="0.3"/>
      <stop offset="0.68" stop-color="#ffd3a7" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffd3a7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rightVeil" x1="720" y1="0" x2="570" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3677ff" stop-opacity="0.94"/>
      <stop offset="0.18" stop-color="#37c5ff" stop-opacity="0.3"/>
      <stop offset="0.68" stop-color="#b8fbff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#b8fbff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sourceWarm" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(40 0) rotate(90) scale(176 70)">
